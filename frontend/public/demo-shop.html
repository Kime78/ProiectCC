<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Shop</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 2rem; display: flex; justify-content: center; }
        .product-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; text-align: center; }
        .product-image { width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 1rem; }
        .product-title { font-size: 1.5rem; color: #333; margin-bottom: 0.5rem; }
        .product-price-container { font-size: 2rem; color: #e63946; font-weight: bold; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="product-card">
        <img id="product-image" class="product-image" src="https://via.placeholder.com/400x300?text=Product+Image" alt="Product">
        <h1 id="product-title" class="product-title">Loading...</h1>
        <div class="product-price-container">
            <span id="product-price">...</span> Lei
        </div>
    </div>

    <script>
        // Use URL query params to dynamically render a mock product
        // Example: ?name=MacBook&price=4999.99
        function renderProduct() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name') || "Demo Mechanical Keyboard";
            
            // Generate a random price between base_price and base_price * 1.5 if just randomizing
            // or take directly from params
            let price = params.get('price');
            if(!price) {
                // fake fluctuating price between 200 and 300
                price = (200 + Math.random() * 100).toFixed(2);
            }

            document.title = name + " - Demo Shop";
            document.getElementById('product-title').innerText = name;
            document.getElementById('product-price').innerText = price;
            
            const image = params.get('image');
            if (image) {
                document.getElementById('product-image').src = decodeURIComponent(image);
            }
        }

        renderProduct();
    </script>
</body>
</html>
